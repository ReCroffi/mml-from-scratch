name: Tests

# Roda a suíte de testes automaticamente a cada push na main e em pull requests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Baixa o código do repositório pra dentro da máquina da CI.
      - uses: actions/checkout@v4

      # 2. Instala o Python 3.11 (mesma versão do ambiente de desenvolvimento).
      #    cache: pip acelera runs futuras reaproveitando as dependências baixadas.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # 3. Instala as dependências a partir do requirements.txt — parte de um
      #    ambiente pelado, o que PROVA que o requirements.txt está completo.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Roda os testes. Se qualquer um falhar, a CI fica vermelha.
      - name: Run tests
        run: python -m pytest -v
